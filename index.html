<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="weather-container">
        <h1>Weather App</h1>
        <input type="text" id="cityInput" placeholder="Enter city name">
        <button id="searchBtn">Search</button> <br>
        <img  id="weatherIcon" width="100" height="100">
        <p id="cityName">City: <span></span></p>
        <p id="temperature">Temperature: <span></span>°C</p>
        <p id="condition">Condition: <span></span></p>
        <p id="windSpeed">Wind Speed: <span></span> m/s</p>
    </div>
    <script src="weather.js"></script>
</body>
</html>
